name: Build macOS DMG

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'engine -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Rust audio engine
        run: cd engine && cargo build --release

      - name: Build Vite frontend
        run: npx vite build

      - name: Build Electron app (.dmg)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioKong-macOS
          path: dist-electron/*.dmg
          retention-days: 30

      - name: Upload .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadioKong-macOS-zip
          path: dist-electron/*.zip
          retention-days: 30

  # Also build on Windows and Linux if needed
  build-linux:
    name: Build Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux audio dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'engine -> target'

      - name: Install npm dependencies
        run: npm ci

      - name: Build Rust audio engine
        run: cd engine && cargo build --release

      - name: Build Vite frontend
        run: npx vite build

      - name: Build Electron app (AppImage + deb)
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RadioKong-Linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
          retention-days: 30
